name: Weekly Telegram Digest

on:
  schedule:
    # Каждый понедельник в 10:00 по Москве = 07:00 UTC
    - cron: '0 7 * * 1'

  # Кнопка "запустить вручную" — удобно для теста
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Получить код репозитория
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установить зависимости
        run: pip install -r requirements.txt

      - name: Запустить скрипт дайджеста
        run: python digest.py
        env:
          API_ID:         ${{ secrets.API_ID }}
          API_HASH:       ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          OUTPUT_CHAT:    ${{ secrets.OUTPUT_CHAT }}
